<p style="font-size: 1.2rem; margin-bottom: 20px;">See what projects, packages or files are in context directly on the Projects, Files or Favourites tabs.</p>\
<img src="https://asi.anahata.uno/screenshots/netbeans/InContextResourcesVisualization.png">\
</div>\
\
<div style="text-align: left; margin-bottom: 20px;">\
<h3 style="color: #004d98; font-size: 1.4rem; margin-bottom: 10px;">Live Screen Sharing</h3>\
<p style="font-size: 1.2rem; margin-bottom: 20px;">Share your screen, individual monitors, or custom regions with the ASI for multimodal visual feedback.</p>\
<img src="https://asi.anahata.uno/screenshots/netbeans/NetBeansLiveScreenSharingAdrianaLima.png">\
</div>\
\
<div style="text-align: left; margin-bottom: 20px;">\
