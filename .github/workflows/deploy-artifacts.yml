name: Deploy Artifacts to Central

on:
  # Trigger on push to main (for Snapshots)
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  # Manual trigger allowed
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25 & Maven
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          # MUST match the <server><id> in settings.xml and <distributionManagement>
          server-id: sonatype-central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Build & Deploy
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Resolved Maven version: $VERSION"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            if [[ "$VERSION" == *-SNAPSHOT ]]; then
              echo "[ERROR] Cannot deploy a SNAPSHOT version ($VERSION) to the production Maven Central Release portal!"
              exit 1
            fi
            echo "[INFO] Tag trigger with release version detected. Deploying to Sonatype Central Release portal..."
            mvn deploy -DskipTests -P release -ntp
          else
            if [[ "$VERSION" != *-SNAPSHOT ]]; then
              echo "[INFO] Branch trigger with release version ($VERSION) detected. Skipping Sonatype Snapshot deployment to prevent bad coordinate rejection."
              mvn package -DskipTests -P release -ntp
            else
              echo "[INFO] Branch trigger with SNAPSHOT version ($VERSION) detected. Deploying to Sonatype Snapshot repository..."
              mvn deploy -DskipTests -P release -ntp -DaltSnapshotDeploymentRepository=sonatype-central::default::https://central.sonatype.com/repository/maven-snapshots/
            fi
          fi

      - name: Purge old snapshot assets
        if: github.ref == 'refs/heads/main'
        run: |
          # Fetch and delete all existing assets for the latest-snapshot release
          assets=$(gh release view latest-snapshot --json assets -q '.assets[].name' || true)
          for asset in $assets; do
            echo "Deleting stale snapshot asset: $asset"
            gh release delete-asset latest-snapshot "$asset" -y || true
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create/Update GitHub Release
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest-snapshot' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Snapshot' }}
          body: |
            ${{ startsWith(github.ref, 'refs/tags/') && 'Official Release' || '🚀 This is an automated rolling snapshot of the main branch. Use with caution!' }}
          files: |
            anahata-asi-nb/target/*.nbm
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          make_latest: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
