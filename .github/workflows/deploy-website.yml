name: Deploy Website & Javadoc

on:
  push:
    branches: [ "master", "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          server-id: sonatype-central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Build and Generate Javadoc
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
        run: mvn clean install javadoc:aggregate -DskipTests -ntp

      - name: Checkout gh-pages Branch (Persistence Database)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: temp-gh-pages

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare Deployment Folder & Merge Javadocs
        run: |
          mkdir -p _site
          # 1. Copy the static website source
          cp -r anahata-asi-web/src/main/resources/web/* _site/
          
          # 2. Reconstruct the historical Javadoc vault (ONLY copy true version directories, skipping legacy root files)
          mkdir -p _site/apidocs
          if [ -d "temp-gh-pages/apidocs" ]; then
            for dir in temp-gh-pages/apidocs/*; do
              if [ -d "$dir" ]; then
                dirname=$(basename "$dir")
                # Only copy directories starting with a digit (the versions)
                if [[ "$dirname" =~ ^[0-9] ]]; then
                  cp -r "$dir" _site/apidocs/
                fi
              fi
            done
          fi
          
          # 3. Copy the newly generated flat Javadocs (Simple, direct copy!)
          if [ -d "docs/apidocs" ]; then
            cp -r docs/apidocs/* _site/apidocs/
          fi

          # 4. Inject CNAME for custom domain
          echo "asi.anahata.uno" > _site/CNAME

          # 5. Dynamically regenerate apidocs/index.html with all discovered versions (excluding Javadoc assets)
          python3 -c '
          import os, re
          apidocs_dir = "_site/apidocs"
          versions = [d for d in os.listdir(apidocs_dir) if os.path.isdir(os.path.join(apidocs_dir, d)) and not d.startswith(".") and d[0].isdigit()]
          versions.sort(reverse=True)
          li_html = ""
          for v in versions:
              badge = " <span class=\"badge\">Latest</span>" if "SNAPSHOT" in v else ""
              # Path matches V2 native aggregate output structure (version/apidocs/index.html)
              li_html += f"            <li class=\"version-item\"><a href=\"{v}/apidocs/index.html\" class=\"version-link\">{v}{badge}</a></li>\n"
          index_path = os.path.join(apidocs_dir, "index.html")
          with open(index_path, "r") as f:
              html = f.read()
          new_html = re.sub(r"<ul class=\"version-list\">.*?</ul>", f"<ul class=\"version-list\">\n{li_html}        </ul>", html, flags=re.DOTALL)
          with open(index_path, "w") as f:
              f.write(new_html)
          '

      - name: Persist New Javadocs back to gh-pages
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        run: |
          cd temp-gh-pages
          # Wipe old files first to completely purge legacy, non-versioned Javadoc directories/assets
          rm -rf apidocs/*
          mkdir -p apidocs
          cp -r ../_site/apidocs/* apidocs/
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add apidocs/
          if ! git diff --cached --quiet; then
            git commit -m "chore: persist versioned Javadocs from run ${{ github.run_id }} 📚"
            git push origin gh-pages
          else
            echo "No new Javadoc changes to persist."
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
