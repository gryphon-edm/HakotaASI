name: Build Standalone Binaries

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Get Project Version
        id: get_version
        shell: bash
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          # jpackage on macOS is strict: version must be 1-3 integers separated by dots.
          # Strip any -SNAPSHOT or other suffixes for the installer metadata.
          JPACKAGE_VERSION=$(echo $VERSION | sed 's/-.*//')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "JPACKAGE_VERSION=$JPACKAGE_VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Project
        run: mvn clean install -DskipTests

      - name: Prepare jpackage Input
        shell: bash
        run: |
          mkdir -p package-input/lib
          # Copy the main executable jar to the root
          cp anahata-asi-desktop/target/anahata-asi-desktop-${{ env.VERSION }}.jar package-input/
          # Copy all runtime dependencies to the lib folder
          mvn -f anahata-asi-desktop/pom.xml dependency:copy-dependencies -DincludeScope=runtime -DoutputDirectory=package-input/lib
          # Copy assets for jpackage flags
          cp anahata-asi-desktop/src/main/resources/icon.* .
          cp anahata-asi-desktop/src/main/resources/splash.png package-input/

      - name: Set OS Specific Variables
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            echo "ICON_FILE=icon.icns" >> $GITHUB_ENV
          elif [ "${{ matrix.os }}" == "windows-latest" ]; then
            echo "ICON_FILE=icon.ico" >> $GITHUB_ENV
          else
            echo "ICON_FILE=icon.png" >> $GITHUB_ENV
          fi

      - name: Package Native App (jpackage)
        shell: bash
        run: |
          jpackage --name "Anahata-ASI-Desktop" \
                   --app-version "${{ env.JPACKAGE_VERSION }}" \
                   --input package-input \
                   --main-jar "anahata-asi-desktop-${{ env.VERSION }}.jar" \
                   --main-class uno.anahata.asi.standalone.SwingMain \
                   --icon "${{ env.ICON_FILE }}" \
                   --java-options "-splash:splash.png" \
                   --type app-image \
                   --dest dist \
                   --verbose
          
          # Zip/Tar the result for distribution
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            7z a "Anahata-ASI-Desktop-${{ env.VERSION }}-windows.zip" "./dist/Anahata-ASI-Desktop"
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            cd dist && zip -r "../Anahata-ASI-Desktop-${{ env.VERSION }}-macos.zip" "Anahata-ASI-Desktop.app" && cd ..
          else
            tar -czf "Anahata-ASI-Desktop-${{ env.VERSION }}-linux.tar.gz" -C dist "Anahata-ASI-Desktop"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.os }}
          path: |
            Anahata-ASI-Desktop-*.zip
            Anahata-ASI-Desktop-*.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: bin-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest-snapshot' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Snapshot' }}
          body: |
            ${{ startsWith(github.ref, 'refs/tags/') && 'Official Release' || '🚀 This is an automated rolling snapshot of the main branch. Use with caution!' }}
          files: |
            all-artifacts/Anahata-ASI-Desktop-*.zip
            all-artifacts/Anahata-ASI-Desktop-*.tar.gz
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          make_latest: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
